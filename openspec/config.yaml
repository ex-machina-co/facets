schema: spec-driven

# Project context: this is shown to the agent when creating artifacts.
context: |
  # Project Constitution

  This constitution codifies the governing architectural constraints for this project. All specifications,
  proposals, and implementations MUST comply with these articles unless an explicit override is documented
  per the governance process below.

  Keywords follow [RFC 2119](https://www.ietf.org/rfc/rfc2119.txt).

  ---

  ## Article I: RFC 2119 Keyword Compliance

  ### Statement
  All specifications, design documents, and requirement definitions MUST use RFC 2119 keywords (MUST, SHALL, SHOULD,
  MAY and their negations) to express requirement levels. Informal language ("should", "needs to", "has to") MUST NOT be
  used for normative requirements.

  ### Rationale
  AI agents interpret specifications literally. Ambiguous requirement language leads to inconsistent implementation
  decisions. RFC 2119 keywords provide a shared, machine-interpretable vocabulary for requirement severity.

  ### Enforcement
  - Spec review checks for RFC 2119 keyword presence in all requirement blocks
  - Proposals without RFC 2119 keywords in requirements sections SHALL be rejected

  ### Override Process
  Not applicable — this article governs spec format and cannot be overridden.

  ---

  ## Article II: Value-Centric Specifications

  The authoritative source of truth for how specifications are written is @openspec/specs/spec-governance/spec.md.
  All spec authoring — including value-centric requirements, domain naming, and avoidance of internal implementation
  details — is governed by that spec. When this constitution and spec-governance conflict, spec-governance is correct.

  ---

  ## Article III: ADR Authority

  ### Statement
  Architectural Decision Records (ADRs) in `architecture/` are the authoritative source of truth for system design —
  including command names, API shapes, data formats, and terminology. Documentation in `docs/` describes these decisions
  for users but MUST NOT contradict them.

  When ADRs and documentation conflict, the ADR is correct and documentation MUST be updated to match.
  Implementations MUST NOT silently drift from accepted ADRs.

  ### Rationale
  ADRs capture the reasoning behind design decisions. Documentation is a downstream artifact that describes those
  decisions for consumption. If docs diverge from ADRs, the system has two conflicting sources of truth — leading to
  implementations that match one but not the other.

  ### Enforcement
  - Proposals referencing behavior covered by an existing ADR MUST cite the ADR
  - Implementations that contradict an accepted ADR SHALL be rejected
  - If an ADR is wrong, it MUST be revised or superseded through the ADR process before implementation diverges

  ### Override Process
  If an ADR is believed to be incorrect, file a new ADR to supersede it. Do not implement against the current ADR
  while the revision is pending.

  ---

  ## Article IV: Roadmap Phase Lifecycle

  ### Statement
  The strategy repository (`../strategy`) contains a roadmap of sequenced execution phases for each namespace
  (e.g., `facets/roadmap/`). Each phase has a lifecycle status: `planned`, `active`, `completed`, or `deferred`.

  Before starting work that corresponds to a roadmap phase, the phase's current status MUST be checked. If the
  phase is `planned`, it MUST be transitioned to `active` (by updating its frontmatter in the strategy repo)
  before implementation begins.

  A phase MUST only be transitioned to `completed` when ALL success criteria defined in the phase document are
  met. Completing a single OpenSpec change set does not necessarily complete a roadmap phase — phases are often
  long-lived and may span multiple change sets. The phase MUST be archived (frontmatter updated to `completed`,
  file moved to `<namespace>/roadmap/archive/`) only when every success criterion is satisfied, per the process
  defined in `../strategy/processes/roadmap/README.md`.

  ### Rationale
  Roadmap phases are the bridge between strategy and implementation. Without explicit lifecycle tracking, phases
  drift into ambiguous states — work begins without marking a phase active, or a phase is declared complete
  before all acceptance criteria are met. Explicit status transitions ensure the roadmap accurately reflects
  what is in progress and what is done.

  ### Enforcement
  - Proposals for work that corresponds to a roadmap phase MUST reference the phase and its current status
  - Implementation MUST NOT begin on a `planned` phase without first transitioning it to `active`
  - A phase MUST NOT be marked `completed` until every success criterion in the phase document is verified
  - Archival follows the process in `../strategy/processes/roadmap/README.md`

  ### Override Process
  Not applicable — roadmap lifecycle is a governance constraint and cannot be overridden.

# Add custom rules for specific artifacts.
rules:
  specs:
    - All requirements MUST use RFC 2119 keywords to indicate requirement levels
    - Each requirement MUST be atomic and focused on a single aspect of functionality or design
    - All spec requirements and scenarios MUST comply with @openspec/specs/spec-governance/spec.md — read the spec before writing or reviewing any specification
  proposal:
    - Proposals MUST be under 500 words
    - SHOULD be distilled down to the smallest thing we can do to deliver customer-focused value
    - Large refactors SHOULD be simple, small, OR incredibly well-justified
    - MUST include a "Non-goals" section
    - Each capability in the Capabilities section MUST correspond to a product domain, not a feature within a domain. Use domain names (e.g., `execution`, `planning`) not domain-feature compounds (e.g., NOT `execution-loop`, `auth-login`, `user-auth`, `data-export`). Check `openspec/specs/` for existing domain names before inventing new ones.
    - MUST reference which ADRs in `architecture/` informed the proposal. If no relevant ADRs exist, state so explicitly.
    - If the proposed work corresponds to a roadmap phase in `../strategy/<namespace>/roadmap/`, the proposal MUST reference the phase file and note its current status. If the phase is `planned`, the proposal MUST note that the phase needs to be transitioned to `active` before implementation begins.
  design:
    - MUST identify any user-facing documentation in `docs/` and root `README.md` that would need updating based on the proposed changes
    - If the design changes observable behavior, CLI commands, APIs, or concepts covered in `docs/`, the design MUST note which doc files need updating
    - MUST check whether the design conflicts with or diverges from any existing ADR in `architecture/` (including `TERMINOLOGY.md`). If ADR drift is detected, this is a HARD STOP — the change MUST NOT proceed until the ADR situation is resolved outside of OpenSpec (either revise the ADR, write a new one, or determine the ADR was wrong). Implementation MUST NOT silently drift from ADRs.
  tasks:
    - |
      Every tasks.md MUST begin with a preamble block before any task headings.
      The preamble MUST instruct the executing agent to load the `viper-execution-rules` skill
      before running any tasks. Use this exact preamble:

      ```
      > **Before executing any tasks below**, load the `viper-execution-rules` skill for the full VIPER step protocol (step types, execution rules, gating, and hard constraints).
      ```
    - Think, read, search, and explore to understand the problem before composing steps
    - Ask the user clarifying questions — don't make large assumptions about intent
    - Write the tasks as you see them
    - ONLY AFTER writing the tasks, load the `viper-planning` skill — it defines all step types, naming conventions, and hard rules
      - You MUST write the tasks first before loading the skill
      - You MUST NOT load the skill until you've written the tasks
    - Reclassify each step as its VIPER step type and prefix the step description with the type
    - |
      Tasks MUST be organized into logical blocks using the Research-then-Implementation pattern:

      - Each block covers a cohesive area of work (e.g., "Create Wizard", "Build Command", "Tests + Docs")
      - Closely related groups (e.g., a wizard UI and the scaffolding code it calls) SHOULD be combined into a single block rather than kept as separate blocks
      - Each block MUST be split into two numbered groups using ## headings:
        - A **Research** group (heading suffixed with "— Research") containing ALL Explore and Propose steps for that block, frontloaded before any implementation
        - An **Implementation** group (heading suffixed with "— Implementation") containing ALL Implement steps followed by a Verify step
      - Explore steps within a Research group SHOULD be scoped to independent topics so they can be executed in parallel via subagents (e.g., separate explores for "Rezi lifecycle", "Rezi widgets", "Rezi focus management" rather than one monolithic explore)
      - The final Propose step in a Research group SHOULD cover the approach for the entire Implementation group, not just one task
      - Setup/dependency groups (e.g., "install packages") that are trivial and don't need research MAY use a flat structure without the Research/Implementation split

      Example:
      ```
      ## 3. <Block Name> — Research
      - [ ] 3.1 Explore: <research topic A — scoped for parallel subagent>
      - [ ] 3.2 Explore: <research topic B — scoped for parallel subagent>
      - [ ] 3.3 Explore: <review existing code relevant to this block>
      - [ ] 3.4 Propose: <approach for the whole implementation block>

      ## 4. <Block Name> — Implementation
      - [ ] 4.1 Implement: <change A>
      - [ ] 4.2 Implement: <change B>
      - [ ] 4.3 Implement: <change C>
      - [ ] 4.4 Verify: <run checks for this block>
      ```
    - MUST check `docs/` and root `README.md` for content that references changed behavior, and SHOULD include documentation update tasks when affected docs are found
    - If the work corresponds to a roadmap phase, the tasks MUST include a final step to check whether the phase's success criteria are fully met. If all criteria are satisfied, the step SHOULD transition the phase to `completed` and archive it. If criteria remain unmet, the step MUST note explicitly what remains.
