pre-commit:
  commands:
    check-bun-version:
      run: bun scripts/check-bun-version.ts
    biome:
      glob: "*.{ts,js,json}"
      run: bunx biome check {staged_files}
    circleci-pack:
      glob: ".circleci/src/**/*.yml"
      run: bun run ci:pack && git add .circleci/config.yml

pre-push:
  commands:
    check:
      run: bun check
